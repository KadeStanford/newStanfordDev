# AWS Amplify Hosting — Next.js 14 (Pages router + API routes)
# Amplify looks for `.next/required-server-files.json`; `baseDirectory` must be `.next`, not repo root.
# https://docs.aws.amazon.com/amplify/latest/userguide/deploy-nextjs-app.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefer-offline --no-audit
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
