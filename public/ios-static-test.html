<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iOS Static Load Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(92vw, 680px);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 16px;
        padding: 24px;
        background: rgba(15, 23, 42, 0.72);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 8vw, 44px);
      }

      p,
      li {
        color: #cbd5e1;
        line-height: 1.5;
      }

      code {
        color: #93c5fd;
      }

      a {
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Static load test</h1>
      <p>
        This page is plain HTML from the same domain. It does not use Next.js,
        React, WebGL, Firebase, reCAPTCHA, or hero images.
      </p>
      <ul id="timings">
        <li>Collecting timings...</li>
      </ul>
      <p>
        Next test:
        <a href="/ios-next-test">/ios-next-test</a><br />
        Homepage:
        <a href="/">/</a>
      </p>
    </main>
    <script>
      window.addEventListener("load", function () {
        var nav = performance.getEntriesByType("navigation")[0];
        var timings = document.getElementById("timings");
        if (!nav || !timings) return;
        timings.innerHTML =
          "<li>TTFB: <code>" +
          Math.round(nav.responseStart) +
          " ms</code></li>" +
          "<li>DOM interactive: <code>" +
          Math.round(nav.domInteractive) +
          " ms</code></li>" +
          "<li>Loaded: <code>" +
          Math.round(nav.loadEventEnd) +
          " ms</code></li>";
      });
    </script>
  </body>
</html>
